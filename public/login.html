<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Accounts Manager</title>
  <meta name="description" content="Secure authentication landing page for Accounts Manager.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;650;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f13;
      --bg-secondary: rgba(22, 22, 29, 0.7);
      --bg-card: rgba(30, 30, 42, 0.45);
      --accent-color: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.45);
      --danger-color: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.35);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-primary);
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(239, 68, 68, 0.05) 0px, transparent 50%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
      position: relative;
      overflow: hidden;
    }

    .login-card:hover {
      border-color: rgba(99, 102, 241, 0.25);
      box-shadow: 0 24px 60px rgba(99, 102, 241, 0.08);
    }

    .login-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      color: var(--accent-color);
      display: flex;
      justify-content: center;
      align-items: center;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      margin-bottom: 0.25rem;
    }

    .login-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 50%, #4f46e5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .input-field {
      width: 100%;
      background-color: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
      outline: none;
    }

    .btn-submit {
      width: 100%;
      background-color: var(--accent-color);
      color: #fff;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      box-shadow: 0 4px 12px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s ease-in-out;
    }

    .btn-submit:hover {
      background-color: #4f46e5;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px var(--accent-glow);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-alert {
      background-color: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    /* Spinner */
    .spinner {
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
            <line x1="6" y1="6" x2="6.01" y2="6"></line>
            <line x1="6" y1="18" x2="6.01" y2="18"></line>
          </svg>
        </div>
        <h1>Accounts Manager</h1>
        <p>Sign in to manage active logout protection</p>
      </div>

      <div class="error-alert" id="error-alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span id="error-message">Invalid credentials</span>
      </div>

      <form id="login-form">
        <div class="form-group" style="margin-bottom: 1.25rem;">
          <label for="username">Username</label>
          <input type="text" id="username" class="input-field" placeholder="Enter username" required autocomplete="username">
        </div>
        <div class="form-group" style="margin-bottom: 1.75rem;">
          <label for="password">Password</label>
          <input type="password" id="password" class="input-field" placeholder="Enter password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">
          <span class="btn-text">Sign In</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("login-form");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const errorAlert = document.getElementById("error-alert");
      const errorMessage = document.getElementById("error-message");
      const submitBtn = document.getElementById("btn-submit");
      const btnText = submitBtn.querySelector(".btn-text");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        // Hide any previous errors
        errorAlert.style.display = "none";

        // Show loading state
        submitBtn.disabled = true;
        btnText.innerHTML = '<span class="spinner"></span> Signing In...';

        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
          });

          const data = await res.json();

          if (res.ok && data.success) {
            // Redirect to home page
            window.location.href = "/";
          } else {
            // Show error
            errorMessage.textContent = data.error || "Authentication failed";
            errorAlert.style.display = "flex";
            // Re-enable form
            submitBtn.disabled = false;
            btnText.textContent = "Sign In";
          }
        } catch (err) {
          console.error("Login fetch error:", err);
          errorMessage.textContent = "Unable to connect to the server.";
          errorAlert.style.display = "flex";
          submitBtn.disabled = false;
          btnText.textContent = "Sign In";
        }
      });
    });
  </script>
</body>
</html>
